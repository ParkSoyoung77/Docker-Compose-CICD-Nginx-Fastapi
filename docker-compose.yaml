services:
  fastapi-app:
    # 워크플로우의 REPO_FASTAPI 변수를 매핑
    image: ${ECR_REGISTRY}/${REPO_FASTAPI}:${IMAGE_TAG}
    container_name: fastapi-container
    restart: always
    expose:
      - "8000"
    networks:
      public-subnet:
        aliases:
          - fastapi-svc

  nginx-app:    
    # 워크플로우의 REPO_NGINX 변수를 매핑
    image: ${ECR_REGISTRY}/${REPO_NGINX}:${IMAGE_TAG}
    container_name: nginx-container
    ports:
      - "80:80"
    volumes:
      - /home/ec2-user/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ec2-user/nginx/html:/usr/share/nginx/html
      - /home/ec2-user/nginx/logs:/var/log/nginx
    restart: always
    depends_on:
      - fastapi-app
    networks:
      public-subnet:
        aliases:
          - nginx-svc

networks:
  public-subnet:
    driver: bridge
services:
  fastapi-app:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY_FASTAPI}:${IMAGE_TAG}
    container_name: fastapi-container
    restart: always
    expose:
      - "8000"
    networks:
      public-subnet:
        aliases:
          - fastapi-svc

  nginx-app:    
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY_NGINX}:${IMAGE_TAG}
    container_name: nginx-container
    ports:
      - "80:80"
    volumes:
      - /home/ec2-user/app/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ec2-user/app/nginx/html:/usr/share/nginx/html
      - /home/ec2-user/app/nginx/logs:/var/log/nginx
    restart: always
    depends_on:
      - fastapi-app
    networks:
      public-subnet:
        aliases:
          - nginx-svc

networks:
  public-subnet:
    driver: bridge
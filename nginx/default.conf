server {
    listen 80;
    server_name aaa.sy99.cloud;

    # 1. 정적 파일 (index.html) 처리
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. /api 요청을 FastAPI 컨테이너로 전달
    location /api {
        proxy_pass http://fastapi-app:8000; # docker-compose의 서비스명 사용
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
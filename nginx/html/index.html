<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SY's Cloud Service</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: var(--card); padding: 3rem; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        .icon-box { background: rgba(99, 102, 241, 0.2); width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
        h1 { font-size: 2.2rem; margin-bottom: 0.5rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 32px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1.1rem; text-decoration: none; display: inline-block; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); }
        .btn:hover { background: #4f46e5; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <div>
        <h1>SY's CI/CD</h1>
        <p>Auto Scaling Group에 Nginx와 FastAPI 도커 컴포즈 배포 실습</p>
        <button class="btn" onclick="location.href='/api'">
            <i class="fas fa-rocket"></i> API Response 확인
        </button>
    </div>
</body>
</html>
